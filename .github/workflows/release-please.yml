name: 🔖 Release Please

# Maintains a release PR from Conventional Commits: it computes the next semver,
# updates CHANGELOG.md, version.txt, and the Makefile PLUGIN_VERSION (via the
# `x-release-please-version` marker). Merging that PR creates the git tag, which
# triggers release.yml (build → sign → publish feed + GitHub Release).
#
# PR creation works with the default GITHUB_TOKEN as long as
# Settings → Actions → General → "Allow GitHub Actions to create and approve pull
# requests" is enabled. A RELEASE_PLEASE_TOKEN PAT (contents + PR write) is
# optional and only needed for fully hands-off tag→build.

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
